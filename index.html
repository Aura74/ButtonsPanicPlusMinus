<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4efe9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Crystal Alarm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="phone">
      <div class="phone__frame">
        <!-- Physical buttons -->
        <div class="phone__button phone__button--power"></div>
        <div class="phone__button phone__button--vol-up"></div>
        <div class="phone__button phone__button--vol-down"></div>

        <!-- Screen -->
        <div class="phone__screen">
          <!-- Camera punch-hole -->
          <div class="phone__camera"></div>

          <!-- Status Bar -->
          <header class="status-bar">
            <time class="status-bar__clock" id="statusClock">00:00</time>
            <div class="status-bar__icons">
              <span class="material-symbols-outlined status-bar__icon">wifi</span>
              <span class="material-symbols-outlined status-bar__icon">signal_cellular_4_bar</span>
              <span class="material-symbols-outlined status-bar__icon">battery_5_bar</span>
            </div>
          </header>

          <!-- App Bar -->
          <div class="app-bar">
            <div class="app-bar__title">
              <select id="providerSelect" class="app-bar__select">
                <option value="crystal">Crystal Alarm</option>
                <option value="guardian">Guardian Alert</option>
                <option value="securewatch">SecureWatch</option>
                <option value="safepoint">SafePoint Pro</option>
                <option value="vigilant">Vigilant Systems</option>
              </select>
            </div>
            <button
              type="button"
              class="app-bar__action"
              id="settingsBtn"
              aria-label="Inställningar"
            >
              <span class="material-symbols-outlined">settings</span>
            </button>
          </div>

          <!-- Main Content -->
          <main class="app-content">
            <div class="timer" id="timerDisplay">
              <span class="timer__value" id="clock">00:00</span>
              <span class="timer__label">MIN : SEK</span>
            </div>

            <div class="controls">
              <button type="button" class="controls__btn controls__btn--decrease" id="decreaseBtn">
                <span class="material-symbols-outlined">remove</span>
              </button>
              <button type="button" class="controls__btn controls__btn--increase" id="increaseBtn">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>

            <button type="button" class="activate-btn" id="activateBtn">
              <span class="material-symbols-outlined activate-btn__icon">alarm</span>
              <span class="activate-btn__label">Aktivera</span>
            </button>
          </main>

          <!-- Settings Page -->
          <div class="settings" id="settingsOverlay">
            <header class="settings__header">
              <button type="button" class="settings__back" id="settingsBackBtn">
                <span class="material-symbols-outlined">arrow_back</span>
              </button>
              <h2 class="settings__title">Inställningar</h2>
            </header>
            <div class="settings__body">
              <section class="settings__group">
                <h3 class="settings__group-title">Ljud</h3>
                <div class="settings__item">
                  <span>Larmljud</span>
                  <select id="alarmSound" class="settings__select">
                    <option value="beep">Pip</option>
                    <option value="siren">Siren</option>
                    <option value="bell">Klocka</option>
                  </select>
                </div>
                <div class="settings__item">
                  <span>Volym</span>
                  <input
                    type="range"
                    id="volumeSlider"
                    min="0"
                    max="100"
                    value="80"
                    class="settings__range"
                  />
                </div>
              </section>
              <section class="settings__group">
                <h3 class="settings__group-title">Display</h3>
                <div class="settings__item">
                  <span>Mörkt tema</span>
                  <label class="toggle">
                    <input type="checkbox" id="darkModeToggle" />
                    <span class="toggle__track">
                      <span class="toggle__thumb"></span>
                    </span>
                  </label>
                </div>
                <div class="settings__item">
                  <span>Vibrera vid larm</span>
                  <label class="toggle">
                    <input type="checkbox" id="vibrateToggle" checked />
                    <span class="toggle__track">
                      <span class="toggle__thumb"></span>
                    </span>
                  </label>
                </div>
              </section>
              <section class="settings__group">
                <h3 class="settings__group-title">Om</h3>
                <div class="settings__item">
                  <span>Version</span>
                  <span class="settings__value">2.0.0</span>
                </div>
              </section>
            </div>
          </div>

          <!-- Android gesture bar -->
          <nav class="gesture-bar">
            <div class="gesture-bar__pill"></div>
          </nav>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
